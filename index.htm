<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SplitEasy</title>

<link rel="stylesheet" href="style.css">

<style>

/* --- MODAL FIX --- */

#modal{
  position: fixed;
  inset:0;
  background: rgba(0,0,0,0.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#modal.hidden{
  display:none;
}

.modal-card{
  background:white;
  padding:20px;
  border-radius:12px;
  max-width:600px;
  width:90%;
}

#btnCloseModal{
  cursor:pointer;
  position:relative;
  z-index:10000;
}

</style>

</head>


<body>

<header class="topbar">

<div class="brand">
<div class="logo">S</div>

<div>
<div class="brand-title">SplitEasy</div>
<div class="brand-sub">International Expense Splitter</div>
</div>

</div>


<div class="toolbar">

<select id="currency" class="input">
<option value="USD">USD ($)</option>
<option value="SGD">SGD ($)</option>
<option value="MMK">MMK (Ks)</option>
<option value="THB">THB (฿)</option>
</select>

<button id="btnShare" class="btn">Share</button>

<button id="btnResetAll" class="btn btn-danger">Reset</button>

</div>

</header>


<div class="container">


<!-- LEFT SIDE -->

<div class="card">

<h2>Group</h2>

<p class="sub">Add members first. Then add expenses.</p>

<div class="row">

<input id="memberName" class="input" placeholder="Add member name">

<button id="btnAddMember" class="btn">Add</button>

</div>

<div id="membersWrap" class="members"></div>



<hr>



<h2>Add Expense</h2>


<label class="label">Title</label>

<input id="expTitle" class="input" placeholder="Dinner, Taxi, Hotel...">


<label class="label">Date & time</label>

<input id="expDateTime" type="datetime-local" class="input">


<label class="label">Amount</label>

<input id="expAmount" type="number" class="input">


<label class="label">Paid by</label>

<select id="expPaidBy" class="input"></select>


<label class="label">Split type</label>

<select id="splitType" class="input">

<option value="equal">Equal split</option>

<option value="custom">Custom</option>

</select>



<div id="participantsWrap" class="participants"></div>

<button id="btnSelectAll" class="btn btn-small">Select all</button>



<div id="customSharesWrap" class="hidden">

<h4>Custom shares</h4>

<div id="customShares"></div>

</div>



<label class="label">Receipt photo</label>

<input type="file" id="expReceipt" accept="image/*" class="input">

<div id="receiptPreview" class="hidden">

<img id="receiptImg" width="120">

<button id="btnClearReceipt" class="btn btn-small">Remove</button>

</div>



<div class="row">

<button id="btnAddExpense" class="btn btn-primary">Add expense</button>

<button id="btnClearExpense" class="btn">Clear</button>

</div>


<div id="msg" class="msg"></div>

</div>




<!-- RIGHT SIDE -->


<div class="card">

<h2>Expenses (History)</h2>

<div class="row">

<select id="sortBy" class="input">

<option value="newest">Newest</option>

<option value="oldest">Oldest</option>

<option value="amountDesc">Amount high</option>

<option value="amountAsc">Amount low</option>

</select>

<input id="search" class="input" placeholder="Search">

</div>


<div id="expensesList"></div>


<h2>Balances</h2>

<div id="balances"></div>


<h2>Settle up</h2>

<div id="settlements"></div>

</div>


</div>



<!-- RECEIPT MODAL -->

<div id="modal" class="hidden">

<div class="modal-card">

<div class="row">

<h3>Receipt</h3>

<button id="btnCloseModal" class="btn">Close</button>

</div>

<img id="modalImg" width="100%">

</div>

</div>



<script src="app.js"></script>

</body>
</html>

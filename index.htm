<!DOCTYPE html>
<html>
<head>
  <title>SplitEasy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4CAF50, #2E8B57);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      width: 320px;
    }

    h1 { margin-bottom: 20px; }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover { background: #45a049; }

    #result {
      margin-top: 15px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>SplitEasy</h1>

    <input type="text" id="names" placeholder="Enter names (John, Mike, Anna)">
    <input type="number" id="amount" placeholder="Total amount">

    <select id="payer">
      <option value="">Select who paid</option>
    </select>

    <button onclick="splitExpense()">Calculate Split</button>

    <div id="result"></div>
  </div>

  <script>
    const namesInput = document.getElementById("names");
    const payerSelect = document.getElementById("payer");

    namesInput.addEventListener("input", function() {
      const names = namesInput.value.split(",").map(n => n.trim()).filter(n => n);
      payerSelect.innerHTML = '<option value="">Select who paid</option>';
      names.forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        payerSelect.appendChild(option);
      });
    });

    function splitExpense() {
      const names = namesInput.value.split(",").map(n => n.trim()).filter(n => n);
      const amount = parseFloat(document.getElementById("amount").value);
      const payer = payerSelect.value;

      if (!amount || names.length === 0 || !payer) {
        document.getElementById("result").innerHTML = "Please enter valid data.";
        return;
      }

      const each = amount / names.length;
      let output = "";

      names.forEach(name => {
        if (name !== payer) {
          output += `${name} owes ${payer} $${each.toFixed(2)}<br>`;
        }
      });

      document.getElementById("result").innerHTML = output;
    }
  </script>

</body>
</html>
